openapi: 3.0.0
info:
  title: 個体管理 API
  description: 種、個体、個体画像、ペアリング情報を管理するためのAPI仕様
  version: 1.0.0

tags:
  - name: species
    x-displayName: 種マスタ
    description: 種マスタ情報を扱うAPI
  - name: individuals
    x-displayName: 個体管理
    description: 個体情報の登録、検索、更新、削除を扱うAPI
  - name: individual-images
    x-displayName: 個体画像管理
    description: 個体に紐づく画像の登録、差し替え、削除、メイン画像設定を扱うAPI
  - name: pairings
    x-displayName: ペアリング管理
    description: ペアリング情報の登録、検索、更新、削除を扱うAPI

paths:
  /species:
    $ref: './paths/species.yaml#/~1species'
  /individuals:
    $ref: './paths/individuals.yaml#/~1individuals'
  /individuals/search:
    $ref: './paths/individuals.yaml#/~1individuals~1search'
  /individuals/{species_id}/{id}:
    $ref: './paths/individuals.yaml#/~1individuals~1{species_id}~1{id}'
  /individuals/{species_id}/{id}/images:
    $ref: './paths/individual-images.yaml#/~1individuals~1{species_id}~1{id}~1images'
  /individuals/{species_id}/{id}/images/{image_id}:
    $ref: './paths/individual-images.yaml#/~1individuals~1{species_id}~1{id}~1images~1{image_id}'
  /individuals/{species_id}/{id}/images/{image_id}/primary:
    $ref: './paths/individual-images.yaml#/~1individuals~1{species_id}~1{id}~1images~1{image_id}~1primary'
  /pairings:
    $ref: './paths/pairings.yaml#/~1pairings'
  /pairings/search:
    $ref: './paths/pairings.yaml#/~1pairings~1search'
  /pairings/{species_id}/{fiscal_year}/{pairing_id}:
    $ref: './paths/pairings.yaml#/~1pairings~1{species_id}~1{fiscal_year}~1{pairing_id}'

components:
  parameters:
    SpeciesIdPath:
      $ref: './components/parameters.yaml#/SpeciesIdPath'
    IndividualIdPath:
      $ref: './components/parameters.yaml#/IndividualIdPath'
    FiscalYearPath:
      $ref: './components/parameters.yaml#/FiscalYearPath'
    PairingIdPath:
      $ref: './components/parameters.yaml#/PairingIdPath'
    ImageIdPath:
      $ref: './components/parameters.yaml#/ImageIdPath'
  schemas:
    SpeciesEntity:
      $ref: './components/schemas.yaml#/SpeciesEntity'
    IndividualImageEntity:
      $ref: './components/schemas.yaml#/IndividualImageEntity'
    PairingEntity:
      $ref: './components/schemas.yaml#/PairingEntity'
    Individual:
      $ref: './components/schemas.yaml#/Individual'